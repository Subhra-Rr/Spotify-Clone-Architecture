<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0c0a0f" />
  <!-- Circle/Glow Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad1)" stroke-width="12" opacity="0.15" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#grad1)" stroke-width="6" opacity="0.3" />
  <!-- Main Musical Note Symbol -->
  <g filter="url(#shadow)">
    <!-- Note heads -->
    <ellipse cx="190" cy="320" rx="35" ry="25" fill="url(#grad1)" transform="rotate(-15, 190, 320)" />
    <ellipse cx="320" cy="285" rx="35" ry="25" fill="url(#grad1)" transform="rotate(-15, 320, 285)" />
    <!-- Stems -->
    <rect x="213" y="140" width="12" height="180" rx="4" fill="url(#grad1)" />
    <rect x="343" y="105" width="12" height="180" rx="4" fill="url(#grad1)" />
    <!-- Beam -->
    <path d="M 213 140 L 355 105 L 355 145 L 213 180 Z" fill="url(#grad1)" />
    <!-- Sound wave lines extending dynamically -->
    <path d="M 120 200 A 80 80 0 0 1 120 312" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" opacity="0.7" />
    <path d="M 90 170 A 120 120 0 0 1 90 342" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" opacity="0.4" />
    <path d="M 392 200 A 80 80 0 0 1 392 312" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" opacity="0.7" />
    <path d="M 422 170 A 120 120 0 0 1 422 342" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" opacity="0.4" />
  </g>
</svg>
