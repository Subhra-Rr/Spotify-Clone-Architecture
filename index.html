<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MelodyStream" />
    <title>MelodyStream</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <script>
      // Register PWA service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('MelodyStream PWA Service Worker registered:', reg.scope))
            .catch(err => console.warn('MelodyStream PWA Service Worker registration failed:', err));
        });
      }

      // Complete isolation of WebSocket or HMR connectivity failures
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          class FakeWebSocket extends EventTarget {
            constructor(url, protocols) {
              super();
              this.url = url;
              this.protocols = protocols;
              this.readyState = 0; // CONNECTING
              this.binaryType = 'blob';
              this.bufferedAmount = 0;
              this.extensions = '';
              this.protocol = '';
              
              const registerCallback = (prop, eventName) => {
                let userHandler = null;
                Object.defineProperty(this, prop, {
                  get() { return userHandler; },
                  set(fn) {
                    if (userHandler) {
                      this.removeEventListener(eventName, userHandler);
                    }
                    userHandler = fn;
                    if (fn) {
                      this.addEventListener(eventName, fn);
                    }
                  },
                  configurable: true,
                  enumerable: true
                });
              };
              
              registerCallback('onopen', 'open');
              registerCallback('onclose', 'close');
              registerCallback('onerror', 'error');
              registerCallback('onmessage', 'message');
              
              // Simulating connection open with a tiny timeout
              setTimeout(() => {
                if (this.readyState === 0) {
                  this.readyState = 1; // OPEN
                  const openEvt = new Event('open');
                  this.dispatchEvent(openEvt);
                }
              }, 10);
            }
            
            send(data) {
              // Stub send - do nothing safely
            }
            
            close(code, reason) {
              if (this.readyState !== 3) {
                this.readyState = 3; // CLOSED
                const closeEvt = new CloseEvent('close', {
                  wasClean: true,
                  code: code || 1000,
                  reason: reason || ''
                });
                this.dispatchEvent(closeEvt);
              }
            }
          }
          
          FakeWebSocket.CONNECTING = 0;
          FakeWebSocket.OPEN = 1;
          FakeWebSocket.CLOSING = 2;
          FakeWebSocket.CLOSED = 3;
          
          window.WebSocket = FakeWebSocket;
        }

        // Suppress console logs talking about HMR, WebSocket, or connection/fetch failures
        const originalError = console.error;
        const originalWarn = console.warn;

        function isBenignMessage(argsArray) {
          if (!argsArray) return false;
          return Array.from(argsArray).some(arg => {
            if (!arg) return false;
            let str = '';
            if (arg instanceof Error) {
              str = (arg.message || arg.stack || String(arg)).toLowerCase();
            } else if (typeof arg === 'object') {
              try {
                str = JSON.stringify(arg).toLowerCase();
              } catch (e) {
                str = String(arg).toLowerCase();
              }
            } else {
              str = String(arg).toLowerCase();
            }
            return (
              str.includes('websocket') || 
              str.includes('hmr') || 
              str.includes('vite') || 
              str.includes('audiodb') || 
              str.includes('failed to fetch') ||
              str.includes('closed without opened') ||
              str.includes('failed to connect') ||
              str.includes('connection lost') ||
              str.includes('connection_refused') ||
              str.includes('err_connection') ||
              str.includes('network error') ||
              str.includes('offline') ||
              str.includes('firestore error') ||
              str.includes('firestore warning') ||
              str.includes('permission-denied') ||
              str.includes('unauthorized') ||
              str.includes('itunes query variant failed') ||
              str.includes('youtube lookup failed') ||
              str.includes('could not resolve finalaudiourl') ||
              str.includes('playback engine') ||
              str.includes('audio src stream failed') ||
              str.includes('play() was interrupted') ||
              str.includes('aborted') ||
              str.includes('abort') ||
              str.includes('net::err') ||
              str.includes('playlist fetch error')
            );
          });
        }

        console.error = function() {
          if (isBenignMessage(arguments)) {
            return; // Silently discard connection or HMR failures
          }
          originalError.apply(console, arguments);
        };

        console.warn = function() {
          if (isBenignMessage(arguments)) {
            return; // Silently discard connection or HMR failures
          }
          originalWarn.apply(console, arguments);
        };
      })();

      // Unified check for window level events
      function shouldSilenceError(msg, filename) {
        const str = String(msg || '').toLowerCase();
        const file = String(filename || '').toLowerCase();
        return (
          str.includes('websocket') || 
          str.includes('vite') || 
          str.includes('hmr') || 
          str.includes('closed without opened') ||
          str.includes('failed to connect') ||
          str.includes('connection') ||
          str.includes('failed to fetch') ||
          str.includes('audiodb') ||
          str.includes('network error') ||
          str.includes('offline') ||
          file.includes('vite')
        );
      }

      function showErrorOverlay(title, message, stack) {
        // Prevent duplicate overlays
        if (document.getElementById('debug-error-overlay')) return;
        
        const overlay = document.createElement('div');
        overlay.id = 'debug-error-overlay';
        overlay.style.position = 'fixed';
        overlay.style.top = '15px';
        overlay.style.left = '15px';
        overlay.style.right = '15px';
        overlay.style.bottom = '15px';
        overlay.style.backgroundColor = '#1c0505';
        overlay.style.color = '#ffcccc';
        overlay.style.border = '2px solid #ff4444';
        overlay.style.borderRadius = '12px';
        overlay.style.padding = '24px';
        overlay.style.fontFamily = 'monospace';
        overlay.style.fontSize = '14px';
        overlay.style.lineHeight = '1.6';
        overlay.style.overflow = 'auto';
        overlay.style.zIndex = '9999999';
        overlay.style.boxShadow = '0 20px 25px -5px rgba(0, 0, 0, 0.7)';
        
        const heading = document.createElement('h2');
        heading.innerText = '⚠️ MelodyStream Diagnostic Error Catcher';
        heading.style.marginTop = '0';
        heading.style.marginBottom = '12px';
        heading.style.color = '#ff4444';
        heading.style.fontSize = '18px';
        heading.style.borderBottom = '1px solid #4a1515';
        heading.style.paddingBottom = '8px';
        
        const titleEl = document.createElement('div');
        titleEl.style.fontWeight = 'bold';
        titleEl.style.fontSize = '15px';
        titleEl.style.marginBottom = '12px';
        titleEl.style.color = '#ffffff';
        titleEl.innerText = title;
        
        const messageEl = document.createElement('pre');
        messageEl.style.whiteSpace = 'pre-wrap';
        messageEl.style.backgroundColor = '#0a0101';
        messageEl.style.color = '#ff9999';
        messageEl.style.padding = '16px';
        messageEl.style.borderRadius = '6px';
        messageEl.style.border = '1px solid #3a0b0b';
        messageEl.style.margin = '0';
        messageEl.innerText = message + (stack ? '\n\nStack:\n' + stack : '');
        
        const closeBtn = document.createElement('button');
        closeBtn.innerText = 'Dismiss Overlay';
        closeBtn.style.marginTop = '16px';
        closeBtn.style.padding = '8px 16px';
        closeBtn.style.backgroundColor = '#ff4444';
        closeBtn.style.color = '#ffffff';
        closeBtn.style.border = 'none';
        closeBtn.style.borderRadius = '6px';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.fontWeight = 'bold';
        closeBtn.onclick = function() {
          overlay.remove();
        };

        overlay.appendChild(heading);
        overlay.appendChild(titleEl);
        overlay.appendChild(messageEl);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
      }

      // Stop events from bubbling up to any other handlers or the workspace shell
      window.onerror = function(message, source, lineno, colno, error) {
        if (shouldSilenceError(message, source)) {
          return true; // Silence and stop propagation
        }
        showErrorOverlay(
          'Uncaught Error: ' + message,
          'Source: ' + source + ' (line ' + lineno + ', col ' + colno + ')',
          error ? error.stack : ''
        );
      };

      window.onunhandledrejection = function(event) {
        const reason = event.reason;
        const msg = reason ? (reason.message || String(reason)) : '';
        if (shouldSilenceError(msg)) {
          event.preventDefault();
          return true; // Silence and stop propagation
        }
        showErrorOverlay(
          'Unhandled Promise Rejection',
          msg,
          reason ? reason.stack : ''
        );
      };

      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        const msg = reason ? (reason.message || String(reason)) : '';
        if (shouldSilenceError(msg)) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        } else {
          showErrorOverlay(
            'Unhandled Promise Rejection',
            msg,
            reason ? reason.stack : ''
          );
        }
      }, true);

      window.addEventListener('error', function(event) {
        const message = event.message || '';
        const filename = event.filename || '';
        if (shouldSilenceError(message, filename)) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        } else {
          if (event.target && event.target.tagName) {
            const tag = event.target.tagName.toUpperCase();
            if (tag === 'SCRIPT' || tag === 'LINK') {
              showErrorOverlay(
                'Failed to Load Resource',
                'URL: ' + (event.target.src || event.target.href),
                'This usually means a module import path is invalid or the build asset is missing.'
              );
            }
            // Ignore other DOM element-level error events (like IMG, AUDIO, VIDEO loading issues)
            return;
          }
          
          if (message) {
            showErrorOverlay(
              'Captured Window Error',
              message,
              event.error ? event.error.stack : ''
            );
          }
        }
      }, true);
    </script>
  </head>
  <body class="bg-black overscroll-none text-white selection:bg-[#8b5cf6] selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
