<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Spotify</title>
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg" />
    <script>
      // Gracefully capture, filter, and suppress benign development environment errors occurring within sandboxed frame environments.
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;

        function isBenignMessage(msg) {
          if (!msg) return false;
          const str = String(msg).toLowerCase();
          return (
            str.includes('websocket') || 
            str.includes('hmr') || 
            str.includes('vite') || 
            str.includes('audiodb') || 
            str.includes('failed to fetch')
          );
        }

        console.error = function() {
          for (let i = 0; i < arguments.length; i++) {
            if (isBenignMessage(arguments[i])) {
              return; // Silently filter out and discard
            }
          }
          originalError.apply(console, arguments);
        };

        console.warn = function() {
          for (let i = 0; i < arguments.length; i++) {
            if (isBenignMessage(arguments[i])) {
              return; // Silently filter out and discard
            }
          }
          originalWarn.apply(console, arguments);
        };
      })();

      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (reason && (
          String(reason).includes('WebSocket') || 
          String(reason).includes('websocket') || 
          String(reason).includes('vite') || 
          String(reason).includes('HMR') ||
          String(reason).includes('Failed to fetch') ||
          String(reason).includes('AudioDB')
        )) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      window.addEventListener('error', function(event) {
        const message = event.message || '';
        const filename = event.filename || '';
        if (
          message.includes('WebSocket') || 
          message.includes('websocket') || 
          message.includes('vite') || 
          message.includes('HMR') ||
          message.includes('Failed to fetch') ||
          message.includes('AudioDB') ||
          filename.includes('vite')
        ) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body class="bg-black overscroll-none text-white selection:bg-[#1DB954] selection:text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
